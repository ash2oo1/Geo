<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنصة الجيولوجية العالمية</title>
    <style>
        body {
            background-color: #0f172a; /* لون ليلي داكن */
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1e293b;
            padding: 25px;
            text-align: center;
            border-bottom: 3px solid #3b82f6; /* خط أزرق تقني */
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        h1 { margin: 0; color: #60a5fa; font-size: 2.5em; }
        p { color: #94a3b8; font-size: 1.2em; }
        .container {
            padding: 30px;
            text-align: center;
        }
        .card {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 15px;
            margin: 20px auto;
            max-width: 600px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }
        .status {
            color: #10b981; /* لون أخضر يدل على العمل */
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>المنصة الجيولوجية</h1>
        <p>المركز الموحد لرصد الزلازل، الأرصاد، والمجال المغناطيسي</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>مرحباً بك في غرفة التحكم الرئيسة</h2>
            <p>هذا هو الهيكل الأساسي للمنصة. في الخطوات القادمة، سنقوم بإزالة هذا النص ووضع خريطة العالم التفاعلية هنا، وربطها ببيانات وكالة (USGS) اللحظية.</p>
            <div class="status">🟢 النظام يعمل وجاهز لاستقبال البيانات...</div>
        </div>
    </div>

</body>
</html>
